<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANON SMS</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #1a1a1a;
    color: #fff;
}

.container {
    max-width: 90%;
    margin: 50px auto;
    padding: 20px;
    background-color: #333;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
}

h1 {
    text-align: center;
    font-size: 1.5rem;
}

form {
    text-align: center;
}

input[type="text"], input[type="submit"] {
    width: 100%;
    padding: 1em;
    margin: 1em 0;
    font-size: 1rem;
    border: none;
    border-radius: 4px;
}

input[type="submit"] {
    background-color: #4CAF50;
    color: white;
    cursor: pointer;
}

input[type="submit"]:hover {
    background-color: #45a049;
}

/* Media query para pantallas más pequeñas */
@media screen and (max-width: 768px) {
    .container {
        padding: 15px;
    }
    h1 {
        font-size: 1.2rem;
    }
}

.author-info {
    text-align: center;
    margin-top: 20px;
}

.author-info a {
    color: #fff;
}
</style>
</head>
<body>
<div class="container">
    <h1>Enviar Mensaje de Texto</h1>
    <form id="textForm">
        <input type="text" id="phoneNumber" placeholder="Número de Teléfono (sin espacios ni guiones)" required>
        <br>
        <input type="text" id="message" placeholder="Mensaje" required>
        <br>
        <input type="submit" value="Enviar">
    </form>
</div>

<div class="author-info">
    <p>Autor: <a href="https://github.com/BAA4TS">baa4ts</a></p>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $(document).ready(function() {
        $('#textForm').submit(function(event) {
            event.preventDefault();
            var phoneNumber = $('#phoneNumber').val();
            var message = $('#message').val();
            sendMessage(phoneNumber, message);
        });
        
        function sendMessage(phoneNumber, message) {
            var requestData = {
                phone: phoneNumber,
                message: message,
                key: 'textbelt'
            };
            
            fetch('https://textbelt.com/text', {
                method: 'post',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestData)
            })
            .then(response => {
                return response.json();
            })
            .then(data => {
                console.log(data);
                if (data.success) {
                    alert('Mensaje enviado correctamente');
                    $('#phoneNumber').val('');
                    $('#message').val('');
                } else {
                    alert('Error al enviar el mensaje');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error al enviar el mensaje');
            });
        }
    });
</script>
</body>
</html>
